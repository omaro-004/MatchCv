# config/services.yaml
# (extrait — ajouter ces lignes à votre services.yaml existant)
#
# Symfony 6/7 : l'autowiring est activé par défaut pour tout le namespace App\.
# La seule configuration explicite nécessaire est le tag kernel.event_subscriber
# sur le FaceIdListener (pour qu'il soit reconnu comme abonné aux événements kernel).

services:

    # ── Déclarations existantes (ne pas modifier) ──────────────────
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # ── NOUVEAU : LoginSuccessHandler ──────────────────────────────
    # Symfony injecte RouterInterface automatiquement via l'autowiring.
    # La déclaration explicite n'est nécessaire que si vous voulez
    # la référencer dans security.yaml par son FQCN (ce que nous faisons).
    App\Security\LoginSuccessHandler:
        arguments:
            $router: '@router'

    # ── NOUVEAU : FaceIdListener (Event Subscriber) ───────────────
    # autoconfigure: true suffit normalement à détecter l'interface
    # EventSubscriberInterface et à poser le tag automatiquement.
    # La déclaration explicite ci-dessous est un garde-fou.
    App\Security\FaceIdListener:
        arguments:
            $tokenStorage: '@security.token_storage'
            $router: '@router'
        tags:
            - { name: kernel.event_subscriber }
